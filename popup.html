<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 180px; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; margin: 0; }
    button { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .start { background-color: #1d9bf0; color: white; }
    .start:hover { background-color: #1a8cd8; }
    .stop { background-color: #e0245e; color: white; display: none; }
    .stop:hover { background-color: #ca1c4d; }
    .status { font-size: 11px; color: #666; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <button id="btn-start" class="start">Start Capturing</button>
  <button id="btn-stop" class="stop">Stop & Save Image</button>
  <div id="status-text" class="status">Ready...</div>
  <script src="popup.js"></script>
</body>
</html>
